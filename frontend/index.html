<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Flashcard Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        background-color: #f8fafc;
        color: #1e293b;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        max-width: 800px;
        width: 100%;
      }
      .upload-container {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        margin-bottom: 2rem;
      }
      h2 {
        margin-top: 0;
        color: #0f172a;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      input[type="file"] {
        border: 2px dashed #cbd5e1;
        padding: 1.5rem;
        border-radius: 8px;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      input[type="file"]:hover {
        border-color: #3b82f6;
      }
      button {
        padding: 0.75rem;
        background-color: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #1d4ed8;
      }
      button:disabled {
        background-color: #94a3b8;
        cursor: not-allowed;
      }

      #status {
        margin-top: 1rem;
        font-size: 0.9rem;
        font-weight: 500;
      }

      .flashcards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
        width: 100%;
      }
      .flashcard {
        background: white;
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        border-left: 4px solid #3b82f6;
        transition: transform 0.2s;
      }
      .flashcard:hover {
        transform: translateY(-2px);
      }
      .flashcard .question {
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #1e293b;
      }
      .flashcard .answer {
        color: #475569;
        line-height: 1.5;
        border-top: 1px solid #f1f5f9;
        padding-top: 0.75rem;
      }
    </style>
  </head>
  <body x-data="flashcardApp()">
    <div class="container">
      <div class="upload-container">
        <h2>Upload PDF to Generate Flashcards</h2>
        <form @submit.prevent="generateFlashcards">
          <input
            type="file"
            id="pdfFile"
            accept="application/pdf"
            required
            @change="file = $event.target.files[0]"
          />
          <button
            type="submit"
            :disabled="loading"
            x-text="loading ? 'Generating...' : 'Generate Flashcards'"
          ></button>
        </form>
        <div id="status" x-text="status" :style="{ color: statusColor }"></div>
      </div>

      <template x-if="flashcards.length > 0">
        <div class="flashcards-grid">
          <template x-for="(card, index) in flashcards" :key="index">
            <div class="flashcard">
              <div class="question" x-text="card.question"></div>
              <div class="answer" x-text="card.answer"></div>
            </div>
          </template>
        </div>
      </template>
    </div>

    <script>
      function flashcardApp() {
        return {
          file: null,
          flashcards: [],
          loading: false,
          status: "",
          statusColor: "black",

          async generateFlashcards() {
            if (!this.file) {
              this.status = "Please select a file.";
              this.statusColor = "red";
              return;
            }

            const formData = new FormData();
            formData.append("pdfFile", this.file);

            this.loading = true;
            this.status = "Analyzing PDF and generating flashcards...";
            this.statusColor = "#2563eb";
            this.flashcards = [];

            try {
              const response = await axios.post(
                "https://createflashcards-co57ef3fpq-as.a.run.app",
                formData,
                {
                  headers: { "Content-Type": "multipart/form-data" },
                },
              );

              this.flashcards = response.data;
              this.status = `Successfully generated ${this.flashcards.length} flashcards!`;
              this.statusColor = "#059669";
            } catch (error) {
              this.status = "Generation failed. Check console for details.";
              this.statusColor = "#dc2626";
              console.error("Error generating flashcards:", error);
            } finally {
              this.loading = false;
            }
          },
        };
      }
    </script>
  </body>
</html>
